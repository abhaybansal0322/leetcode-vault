name: leetcode-sync
on:
  schedule:
    - cron: "17 * * * *"  # hourly at :17 (off-peak = more reliable timing)
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write           # so the job can push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python sync_leetcode.py
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
          GIT_AUTHOR_NAME: leetcode-sync
          GIT_AUTHOR_EMAIL: bot@users.noreply.github.com
          GIT_COMMITTER_NAME: leetcode-sync
          GIT_COMMITTER_EMAIL: bot@users.noreply.github.com
